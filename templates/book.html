<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Pitch - GraO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-wrapper">
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('index') }}">
                    <i class="bi bi-trophy-fill"></i> GraO PITCH
                </a>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section section--booking">
            <div class="container">
                <div class="booking-wrapper">
                    <div class="card card--booking">
                        <div class="card-header">
                            <h1>Book a Pitch</h1>
                        </div>
                        <div class="card-body">
                            <form id="booking-form" method="post" action="{{ url_for('book_pitch') }}">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="booker_name">Your Full Name</label>
                                        <input type="text" id="booker_name" name="booker_name" class="form-control"
                                            placeholder="Enter your name" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="guest_email">Email Address</label>
                                        <input type="email" id="guest_email" name="guest_email" class="form-control"
                                            placeholder="name@example.com" required>
                                        <small class="form-hint">We'll send booking details here.</small>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="pitch_id">Select Pitch</label>
                                    <select id="pitch_id" name="pitch_id" class="form-control" required>
                                        <option value="" disabled selected>-- Choose a Pitch --</option>
                                        {% for p in pitches %}
                                        <option value="{{ p.id }}" {% if p.status !='available' %}disabled{% endif %}{%
                                            if request.args.get('pitch_id')==p.id|string %} selected{% endif %}>
                                            {{ p.pitch_name }}{% if p.status != 'available' %} ({{ p.status|capitalize
                                            }}){% endif %}
                                        </option>
                                        {% endfor %}
                                    </select>
                                    <small class="form-hint">Blocked pitches cannot be selected.</small>
                                </div>

                                <div class="form-group">
                                    <label for="booking_date">Select Date</label>
                                    <input type="date" id="booking_date" name="booking_date" class="form-control"
                                        required>
                                    <small class="form-hint">Reservations open for the next 30 days.</small>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="start_time">Start Time</label>
                                        <input type="time" id="start_time" name="start_time" class="form-control"
                                            min="06:00" max="18:00" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="end_time">End Time</label>
                                        <input type="time" id="end_time" name="end_time" class="form-control"
                                            min="07:00" max="19:00" required>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="purpose">Purpose of Booking</label>
                                    <input type="text" id="purpose" name="purpose" class="form-control"
                                        placeholder="e.g. Training session" required>
                                </div>

                                <div class="form-actions">
                                    <a href="{{ url_for('availability_dashboard') }}" class="btn btn-secondary">Back</a>
                                    <button type="submit" class="btn btn-primary">Confirm Booking</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const today = new Date();
            const maxDate = new Date();
            maxDate.setDate(today.getDate() + 30);
            const minStr = today.toISOString().split('T')[0];
            const maxStr = maxDate.toISOString().split('T')[0];
            const dateInput = document.getElementById('booking_date');
            if (dateInput) {
                dateInput.setAttribute('min', minStr);
                dateInput.setAttribute('max', maxStr);
            }
        });
    </script>
</body>

</html>
